name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Explain the problem this feature would solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the preferred behavior or API at a high level.
